<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>解二次方程</title>
</head>
<body>
    <script>
        // (1) 调用 prompt 获取用户输入的系数 a, b, c
        let inputA = prompt("请输入系数 a：");
        let inputB = prompt("请输入系数 b：");
        let inputC = prompt("请输入系数 c：");

        // (2) 转换为数字类型 (parseFloat 处理小数，parseInt 仅处理整数)
        let a = parseFloat(inputA);
        let b = parseFloat(inputB);
        let c = parseFloat(inputC);

        // (3) 计算判别式 delta
        let delta = b * b - 4 * a * c;

        // (4) 计算两个根
        let x1 = (-b + Math.sqrt(delta)) / (2 * a);
        let x2 = (-b - Math.sqrt(delta)) / (2 * a);

        // (5) 使用 alert 弹窗展示结果
        alert(`方程的两个根为：\nx1 = ${x1}\nx2 = ${x2}`);

        // (6) 在控制台打印结果 (F12 查看)
        console.log("一元二次方程求解结果：");
        console.log("系数 a =", a, "b =", b, "c =", c);
        console.log("判别式 delta =", delta);
        console.log("根 x1 =", x1);
        console.log("根 x2 =", x2);
    </script>
</body>
</html>
